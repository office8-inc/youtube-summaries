name: Deploy to FTP on Merge

on:
  push:
    branches: [main]
    paths:
      - 'xserver/summaries/**/*.md'
      - 'xserver/index.html'
      - 'xserver/get_articles.php'
      - 'xserver/marked.min.js'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: '全ファイルをアップロード（通常は変更分のみ）'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy-to-ftp:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 差分検出のため直前のコミットも取得
      
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
      
      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event.inputs.deploy_all }}" == "true" ]; then
            echo "mode=all" >> $GITHUB_OUTPUT
          else
            # PRマージ時も手動実行時も、最新コミットの変更ファイルを取得
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '^xserver/' || true)
            
            if [ -z "$CHANGED_FILES" ]; then
              echo "mode=none" >> $GITHUB_OUTPUT
              echo "変更されたファイルはありません"
            else
              echo "mode=diff" >> $GITHUB_OUTPUT
              echo "$CHANGED_FILES" > changed_files.txt
              echo "変更されたファイル:"
              cat changed_files.txt
            fi
          fi
      
      - name: Upload to FTP (差分アップロード)
        if: steps.changed-files.outputs.mode != 'none'
        run: |
          # lftpスクリプトを作成
          cat > upload.lftp << 'EOF'
          set ftp:ssl-allow no
          set net:timeout 10
          set net:max-retries 3
          
          open ftp://${{ secrets.FTP_USER }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_HOST }}
          
          EOF
          
          UPLOAD_COUNT=0
          
          if [ "${{ steps.changed-files.outputs.mode }}" == "all" ]; then
            echo "⚠️  全ファイルアップロードモード"
            
            # summaries配下の全.mdファイルと.jsonファイル
            while IFS= read -r file; do
              REMOTE_PATH="${file#xserver/summaries/}"
              REMOTE_DIR=$(dirname "$REMOTE_PATH")
              
              if [ "$REMOTE_DIR" != "." ]; then
                echo "mkdir -p $REMOTE_DIR" >> upload.lftp
              fi
              echo "put \"$file\" -o \"$REMOTE_PATH\"" >> upload.lftp
              echo "✓ $REMOTE_PATH を追加"
              UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
            done < <(find xserver/summaries \( -name "*.md" -o -name "*.json" \) -type f)
            
            # xserver直下のファイル
            for file in xserver/index.html xserver/get_articles.php xserver/marked.min.js; do
              if [ -f "$file" ]; then
                FILENAME=$(basename "$file")
                echo "put \"$file\" -o \"$FILENAME\"" >> upload.lftp
                echo "✓ $FILENAME を追加"
                UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
              fi
            done
          else
            echo "💡 差分アップロードモード（変更ファイルのみ）"
            
            # 変更されたファイルのみアップロード
            while IFS= read -r file; do
              if [[ "$file" == xserver/summaries/* ]]; then
                REMOTE_PATH="${file#xserver/summaries/}"
                REMOTE_DIR=$(dirname "$REMOTE_PATH")
                
                if [ "$REMOTE_DIR" != "." ]; then
                  echo "mkdir -p $REMOTE_DIR" >> upload.lftp
                fi
                echo "put \"$file\" -o \"$REMOTE_PATH\"" >> upload.lftp
                echo "✓ $REMOTE_PATH を追加 (変更検出)"
                UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
              elif [[ "$file" == xserver/* ]]; then
                FILENAME=$(basename "$file")
                echo "put \"$file\" -o \"$FILENAME\"" >> upload.lftp
                echo "✓ $FILENAME を追加 (変更検出)"
                UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
              fi
            done < changed_files.txt
          fi
          
          echo "bye" >> upload.lftp
          
          # lftpスクリプトを実行
          if [ $UPLOAD_COUNT -gt 0 ]; then
            echo ""
            echo "📤 FTPアップロード中..."
            lftp -f upload.lftp
            echo ""
            echo "✅ $UPLOAD_COUNT ファイルをアップロードしました"
          else
            echo "ℹ️  アップロード対象のファイルがありません"
          fi
      
      - name: Summary
        if: always()
        run: |
          echo "## 📊 FTPアップロード完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "main ブランチへのプッシュに伴い、変更ファイルをXSERVERにアップロードしました。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 公開URL: https://office8-inc.com/youtube-summaries/" >> $GITHUB_STEP_SUMMARY
